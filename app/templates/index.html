<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Todo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="todo-container">

        <h1>FastAPI Todo</h1>

        <!-- 로그인 영역 -->
        <div id="auth-box">
            <div id="login-form">
                <input type="text" id="login-username" placeholder="아이디">
                <input type="password" id="login-password" placeholder="비밀번호">
                <button onclick="login()">로그인</button>
                <button onclick="signup()">회원가입</button>
            </div>

            <div id="user-info" style="display: none;">
                <span id="welcome-text"></span>
                <button onclick="logout()">로그아웃</button>
            </div>
        </div>

        <hr>

        <!-- Todo 생성 -->
        <div class="todo-input-box">
            <input type="text" id="create-title" placeholder="할 일을 입력하세요">
            <input type="file" id="create-image" accept="image/*">
            <button onclick="createTodo()">추가</button>
        </div>

        <!-- 검색 / 필터 -->
        <div class="search-filter-box">
            <input type="text" id="search-input" placeholder="검색어를 입력하세요">
            <select id="filter-status">
                <option value="all">전체</option>
                <option value="done">완료</option>
                <option value="undone">미완료</option>
            </select>
            <select id="sort-order">
                <option value="">기본 정렬</option>
                <option value="asc">오름차순</option>
                <option value="desc">내림차순</option>
            </select>
            <button class="search-btn" onclick="searchTodos()">검색</button>
            <button class="reset-btn" onclick="resetSearch()">초기화</button>
        </div>

        <div id="message-box"></div>

        <ul id="todo-list" class="todo-list"></ul>

    <!-- 수정 모달 -->
    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
        <div style="background:white; border-radius:16px; padding:30px; width:360px; display:flex; flex-direction:column; gap:14px;">
            <h3 style="margin:0; color:#1e293b;">Todo 수정</h3>
            <input type="text" id="edit-title-input" placeholder="제목" style="padding:12px; border:2px solid #dbeafe; border-radius:10px; font-size:16px; outline:none;">
            
            <!-- 현재 이미지 미리보기 -->
            <div id="edit-image-preview" style="display:none;">
                <img id="edit-current-image" src="" alt="현재 이미지" style="width:100%; border-radius:10px; border:1px solid #cbd5e1;">
                <button onclick="submitDeleteImage()" style="width:100%; margin-top:8px; padding:10px; background:#f97316; color:white; border:none; border-radius:10px; font-size:14px; cursor:pointer;">🗑 이미지 삭제</button>
            </div>

            <!-- 새 이미지 업로드 -->
            <input type="file" id="edit-image-input" accept="image/*">

            <div style="display:flex; gap:10px;">
                <button onclick="submitEdit()" style="flex:1; padding:12px; background:#0f766e; color:white; border:none; border-radius:10px; font-size:15px; cursor:pointer;">저장</button>
                <button onclick="closeEditModal()" style="flex:1; padding:12px; background:#64748b; color:white; border:none; border-radius:10px; font-size:15px; cursor:pointer;">취소</button>
            </div>
        </div>
    </div>


    </div>

    <script>
        let token = localStorage.getItem("token");
        
        function buildQueryString() {
            const keyword = document.getElementById("search-input").value.trim();
            const done = document.getElementById("filter-status").value;
            const sort = document.getElementById("sort-order").value;

            const params = new URLSearchParams();

            if (keyword) params.append("keyword", keyword);
            if (done === "done") params.append("done", "true");
            if (done === "undone") params.append("done", "false");
            if (sort) params.append("sort", sort);

            const queryString = params.toString();
            return queryString ? `/todos?${queryString}` : "/todos";
        }

        function showMessage(message, isError = false) {
            const box = document.getElementById("message-box");
            box.innerHTML = `<p class="${isError ? 'error' : 'success'}">${message}</p>`;
        }

        function setLoggedIn(username) {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("user-info").style.display = "flex";
            document.getElementById("welcome-text").innerText = `${username}님 로그인`;
        }

        function setLoggedOut() {
            document.getElementById("login-form").style.display = "flex";
            document.getElementById("user-info").style.display = "none";
        }

        function logout(showMsg = true) {
            localStorage.removeItem("token");
            token = null;
            setLoggedOut();
            document.getElementById("todo-list").innerHTML = "";

            if (showMsg) {
                showMessage("로그아웃 되었습니다.");
            }
        }


        function searchTodos() {
            const url = buildQueryString();
            loadTodos(url);
        }

        function resetSearch() {
            document.getElementById("search-input").value = "";
            document.getElementById("filter-status").value = "all";
            document.getElementById("sort-order").value = "";
            loadTodos("/todos");
        }

        async function signup() {
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value.trim();

            if (!username || !password) {
                showMessage("아이디와 비밀번호를 입력하세요.", true);
                return;
            }

            const res = await fetch("/users/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            const data = await res.json();

            if (!res.ok) {
                showMessage(data.detail || "회원가입 실패", true);
                return;
            }

            showMessage("회원가입 성공");
        }

        async function login() {
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value.trim();

            if (!username || !password) {
                showMessage("아이디와 비밀번호를 입력하세요.", true);
                return;
            }

            const res = await fetch("/users/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            const data = await res.json();

            if (!res.ok) {
                showMessage(data.detail || "로그인 실패", true);
                return;
            }

            token = data.access_token;
            localStorage.setItem("token", token);

            setLoggedIn(username);
            showMessage("로그인 성공");

            await loadTodos();
        }

        async function loadTodos(url = "/todos") {
            if (!token) return;

            const res = await fetch(url, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401) {
                logout(false);
                showMessage("로그인이 만료되었습니다. 다시 로그인해주세요.", true);
                return;
            }

            const data = await res.json();

            if (!res.ok) {
                showMessage(data.detail || "목록 조회 실패", true);
                return;
            }

            const todos = data;
            const list = document.getElementById("todo-list");
            list.innerHTML = "";

            todos.forEach(todo => {
                const li = document.createElement("li");
                li.className = "todo-item";

                li.innerHTML = `
                    <div class="todo-left">
                        ${todo.image_path ? `<img src="${todo.image_path}" alt="todo image" class="todo-thumb">` : ""}
                        <span class="${todo.done ? 'completed' : ''}">
                            ${todo.title}
                        </span>
                    </div>

                    <div class="todo-buttons">
                        <button class="edit-btn" onclick="editTodo(${todo.id}, '${todo.title.replace(/'/g, "\\'")}', ${todo.done}, '${todo.image_path || ''}')">수정</button>
                        <button class="edit-btn" onclick="toggleDone(${todo.id}, ${todo.done})">완료</button>
                        <button class="delete-btn" onclick="deleteTodo(${todo.id})">삭제</button>
                    </div>
                `;

                list.appendChild(li);
            });
        }

        async function createTodo() {
            if (!token) {
                showMessage("먼저 로그인해주세요.", true);
                return;
            }

            const title = document.getElementById("create-title").value.trim();
            const imageFile = document.getElementById("create-image").files[0];

            if (!title) {
                showMessage("할 일을 입력하세요", true);
                return;
            }

            const formData = new FormData();
            formData.append("title", title);
            formData.append("done", "false");

            if (imageFile) {
                formData.append("image", imageFile);
            }

            const res = await fetch("/todos", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token
                },
                body: formData
            });

            if (res.status === 401) {
                logout(false);
                showMessage("로그인이 만료되었습니다. 다시 로그인해주세요.", true);
                return;
            }

            const data = await res.json();

            if (!res.ok) {
                showMessage(data.detail || "생성 실패", true);
                return;
            }

            showMessage("Todo 생성 완료");
            document.getElementById("create-title").value = "";
            document.getElementById("create-image").value = "";

            await loadTodos();
        }

        let editingTodoId = null;
        let editingTodoDone = null;
        let editingTodoImagePath = null;

        function editTodo(id, oldTitle, oldDone, imagePath) {
            editingTodoId = id;
            editingTodoDone = oldDone;
            editingTodoImagePath = imagePath;

            document.getElementById("edit-title-input").value = oldTitle;
            document.getElementById("edit-image-input").value = "";

            const preview = document.getElementById("edit-image-preview");
            const currentImg = document.getElementById("edit-current-image");

            if (imagePath) {
                currentImg.src = imagePath;
                preview.style.display = "block";
            } else {
                preview.style.display = "none";
            }

            document.getElementById("edit-modal").style.display = "flex";
        }

        function closeEditModal() {
            document.getElementById("edit-modal").style.display = "none";
            editingTodoId = null;
            editingTodoDone = null;
        }

        async function submitEdit() {
            const trimmed = document.getElementById("edit-title-input").value.trim();
            const imageFile = document.getElementById("edit-image-input").files[0];

            if (!trimmed) {
                showMessage("제목은 비워둘 수 없습니다.", true);
                return;
            }

            const formData = new FormData();
            formData.append("title", trimmed);
            formData.append("done", editingTodoDone.toString());

            if (imageFile) {
                formData.append("image", imageFile);
            }

            if (editingTodoImagePath === null) {
                formData.append("delete_image", "true");
            }

            const res = await fetch(`/todos/${editingTodoId}`, {
                method: "PUT",
                headers: { "Authorization": "Bearer " + token },
                body: formData
            });

            if (res.status === 401) {
                logout(false);
                showMessage("로그인이 만료되었습니다. 다시 로그인해주세요.", true);
                return;
            }

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
                showMessage(data.detail || "수정 실패", true);
                return;
            }

            showMessage("수정 완료");
            closeEditModal();
            await loadTodos();
        }

        async function deleteTodo(id) {
            if (!token) {
                showMessage("먼저 로그인해주세요.", true);
                return;
            }

            const res = await fetch(`/todos/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401) {
                logout(false);
                showMessage("로그인이 만료되었습니다. 다시 로그인해주세요.", true);
                return;
            }

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                showMessage(data.detail || "삭제 실패", true);
                return;
            }

            showMessage("삭제 완료");
            await loadTodos();
        }

        async function toggleDone(id, done) {
            if (!token) {
                showMessage("먼저 로그인해주세요.", true);
                return;
            }

            const formData = new FormData();
            formData.append("done", (!done).toString());

            const res = await fetch(`/todos/${id}`, {
                method: "PUT",
                headers: {
                    "Authorization": "Bearer " + token
                },
                body: formData
            });

            if (res.status === 401) {
                logout(false);
                showMessage("로그인이 만료되었습니다. 다시 로그인해주세요.", true);
                return;
            }

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
                showMessage(data.detail || "수정 실패", true);
                return;
            }

            showMessage("수정 완료");
            await loadTodos();
        }

        async function checkLogin() {
            if (!token) {
                return;
            }

            const res = await fetch("/users/me", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!res.ok) {
                logout(false);
                return;
            }

            const data = await res.json();
            setLoggedIn(data.username);
            await loadTodos();
        }

        // 이미지 삭제 버튼 → 화면에서만 숨김
        function submitDeleteImage() {
            editingTodoImagePath = null;
            document.getElementById("edit-image-preview").style.display = "none";
            document.getElementById("edit-current-image").src = "";
        }

        checkLogin();
    </script>

</body>

</html>
